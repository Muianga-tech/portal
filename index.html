<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muianga-tech | Portal do Mundo Digital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        
        <div class="form-box" id="loginBox">
            <h2>Muianga-tech<br><span>Login</span></h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="email" id="loginEmail" placeholder="E-mail" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Senha" required>
                </div>
                
                <div class="options">
                    <label><input type="checkbox"> Lembrar-me</label>
                    <a href="#" class="forgot-pass">Esqueci a senha?</a>
                </div>
                
                <button type="submit" class="btn">Login</button>
                
                <p class="switch-text">Não tem uma conta? <a href="#" id="toRegister">Cadastre-se</a></p>
            </form>
        </div>

        <div class="form-box hidden" id="registerBox">
            <h2>Criar Conta</h2>
            
            <form id="registerForm">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="regName" placeholder="Nome Completo" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="E-mail" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Escolha uma Senha" required>
                </div>
                
                <button type="submit" class="btn">Registrar</button>
                
                <p class="switch-text">Já tem uma conta? <a href="#" id="toLogin">Faça Login</a></p>
            </form>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
